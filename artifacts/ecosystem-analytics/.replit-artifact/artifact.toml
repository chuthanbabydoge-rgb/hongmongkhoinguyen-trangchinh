kind = "web"
previewPath = "/"
title = "Ecosystem Analytics"
version = "1.0.0"
id = "artifacts/ecosystem-analytics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18928

[services.development]
run = "pnpm --filter @workspace/ecosystem-analytics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ecosystem-analytics", "run", "build" ]
publicDir = "artifacts/ecosystem-analytics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18928"
BASE_PATH = "/"
