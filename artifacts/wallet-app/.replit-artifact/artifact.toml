kind = "web"
previewPath = "/"
title = "Wallet Context Demo"
version = "1.0.0"
id = "artifacts/wallet-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24972

[services.development]
run = "pnpm --filter @workspace/wallet-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wallet-app", "run", "build" ]
publicDir = "artifacts/wallet-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24972"
BASE_PATH = "/"
